<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — AUSHVERA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
      max-width: 500px;
    }
    .logo { font-size: 42px; margin-bottom: 8px; }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #c9a96e;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .sub {
      font-size: 13px;
      color: rgba(255,255,255,.4);
      margin-bottom: 40px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .card {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(201,169,110,.2);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 20px;
    }
    .card h2 { font-size: 16px; color: #c9a96e; margin-bottom: 10px; }
    .card p { font-size: 13px; color: rgba(255,255,255,.55); line-height: 1.7; margin-bottom: 20px; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #c9a96e, #a07840);
      color: #fff;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity .2s;
      width: 100%;
      border: none;
      cursor: pointer;
    }
    .btn:hover { opacity: .88; }
    .btn.outline {
      background: transparent;
      border: 1px solid rgba(201,169,110,.4);
      color: #c9a96e;
      margin-top: 10px;
    }
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,.07);
      margin: 28px 0;
    }
    .form-group { margin-bottom: 14px; text-align: left; }
    label { font-size: 11px; color: rgba(255,255,255,.45); display: block; margin-bottom: 5px; letter-spacing: .5px; text-transform: uppercase; }
    input {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
    }
    input:focus { outline: none; border-color: #c9a96e; }
    .info {
      font-size: 12px;
      color: rgba(255,255,255,.3);
      margin-top: 14px;
    }
    #status { display: none; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
    #status.error { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.3); }
    #status.success { background: rgba(16,185,129,.15); color: #34d399; border: 1px solid rgba(16,185,129,.3); }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">🌿</div>
  <h1>AUSHVERA</h1>
  <p class="sub">Admin Panel</p>

  <div class="card">
    <h2>🔐 Admin Login</h2>
    <p>Sign in to access your dashboard, manage products, orders, and AI Agent.</p>

    <div id="status"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="adminEmail" placeholder="admin@aushvera.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="adminPassword" placeholder="••••••••">
    </div>

    <button class="btn" onclick="doAdminLogin()">Sign In to Admin Panel →</button>

    <hr class="divider">

    <p class="info">ℹ️ The Admin Panel requires a PHP backend. On this static site, login will connect to the backend server.</p>
  </div>

  <a href="/index.html" class="btn outline">← Back to AUSHVERA Store</a>
</div>

<script>
// Auto-detect backend
const BACKEND = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:8000'
  : 'https://thaaushvera-backend.up.railway.app';

async function doAdminLogin() {
  const email = document.getElementById('adminEmail').value;
  const password = document.getElementById('adminPassword').value;
  const status = document.getElementById('status');

  if (!email || !password) {
    status.className = 'error'; status.style.display = 'block';
    status.textContent = 'Please enter email and password.'; return;
  }

  status.className = ''; status.style.display = 'block';
  status.textContent = 'Signing in...';

  try {
    const r = await fetch(`${BACKEND}/api/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Accept': 'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await r.json();

    if (r.ok && (data.data?.user?.role === 'super_admin' || data.data?.user?.role === 'admin')) {
      localStorage.setItem('auth_token', data.data.token);
      localStorage.setItem('currentUser', JSON.stringify(data.data.user));
      status.className = 'success'; status.textContent = '✅ Login successful! Redirecting...';
      setTimeout(() => { window.location.href = BACKEND + '/admin'; }, 800);
    } else if (r.ok) {
      status.className = 'error'; status.style.display = 'block';
      status.textContent = '⚠️ You do not have admin access.';
    } else {
      status.className = 'error';
      status.textContent = data.message || 'Invalid credentials.';
    }
  } catch (e) {
    status.className = 'error';
    status.textContent = '⚠️ Cannot reach backend server. Please make sure the PHP backend is running.';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doAdminLogin(); });
</script>
</body>
</html>
