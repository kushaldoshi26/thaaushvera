services:
  - type: web
    name: thaaushvera
    runtime: docker
    plan: free
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    disk:
      name: thaaushvera-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_NAME
        value: AUSHVERA
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://thaaaaaaushvera.onrender.com
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/data/database.sqlite
      - key: LOG_CHANNEL
        value: stderr
      # Social Login Placeholders
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://thaaaaaaushvera.onrender.com/auth/google/callback
      - key: FACEBOOK_CLIENT_ID
        sync: false
      - key: FACEBOOK_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_REDIRECT_URI
        value: https://thaaaaaaushvera.onrender.com/auth/facebook/callback
      # Other Config
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
      # Razorpay Payment Integration
      - key: RAZORPAY_KEY
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
      # Email Configuration (SMTP)
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_ENCRYPTION
        value: tls
      - key: ADMIN_EMAIL
        value: admin@aushvera.com
