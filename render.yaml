services:
  - type: web
    name: thaaushvera
    runtime: docker
    plan: free
    rootDir: .
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: AUSHVERA
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://theaushvera-u0g3.onrender.com
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/data/database.sqlite
      - key: LOG_CHANNEL
        value: stderr
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
    disk:
      name: laravel-data
      mountPath: /var/data
      sizeGB: 1
