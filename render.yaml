services:
  - type: web
    name: aushvera-backend
    env: php
    rootDir: backend
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan migrate --force && php artisan db:seed --class=SuperAdminSeeder --force && php artisan db:seed --class=ProductSeeder --force && php artisan storage:link
    startCommand: php artisan serve --host=0.0.0.0 --port=10000
    envVars:
      - key: APP_NAME
        value: Aushvera
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://aushvera-backend.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: dpg-your-db-host
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: your-db-name
      - key: DB_USERNAME
        value: your-db-user
      - key: DB_PASSWORD
        generateValue: true
      - key: APP_KEY
        generateValue: true
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: GOOGLE_CLIENT_ID
        value: your-google-id
      - key: GOOGLE_CLIENT_SECRET
        value: your-google-secret
      - key: GOOGLE_REDIRECT_URI
        value: https://aushvera-backend.onrender.com/auth/google/callback
      - key: FACEBOOK_CLIENT_ID
        value: your-facebook-id
      - key: FACEBOOK_CLIENT_SECRET
        value: your-facebook-secret
      - key: FACEBOOK_REDIRECT_URI
        value: https://aushvera-backend.onrender.com/auth/facebook/callback
      - key: AI_SERVER_URL
        value: https://aushvera-ai-agent.onrender.com

  - type: web
    name: aushvera-ai-agent
    env: python
    rootDir: ai-agent
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
