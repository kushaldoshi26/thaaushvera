services:
  - type: web
    name: thaaushvera
    runtime: docker
    plan: free
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    disk:
      name: thaaushvera-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_NAME
        value: AUSHVERA
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://theaushvera-u0g3.onrender.com
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/data/database.sqlite
      - key: LOG_CHANNEL
        value: stderr
      # Social Login Placeholders
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_CLIENT_ID
        sync: false
      - key: FACEBOOK_CLIENT_SECRET
        sync: false
      # Other Config
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
