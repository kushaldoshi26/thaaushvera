<VirtualHost *:80>
    ServerName thaaushvera.onrender.com
    DocumentRoot /var/www/html/public

    # ─── Force HTTPS (Render terminates SSL at its load balancer) ────────────────
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteCond %{HTTP:X-Forwarded-Proto} =http
        RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
    </IfModule>

    <Directory /var/www/html/public>
        AllowOverride All
        Options -Indexes +FollowSymLinks
        Require all granted

        # Serve index.php FIRST — Laravel routing takes priority over static HTML
        DirectoryIndex index.php index.html

        # Laravel clean URLs — all requests go through index.php
        <IfModule mod_rewrite.c>
            RewriteEngine On

            # Block direct .html access — redirect to clean URL
            RewriteCond %{REQUEST_URI} \.html$
            RewriteRule ^(.*)\.html$ /$1 [R=301,L]

            # Route everything through Laravel
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.php [L]
        </IfModule>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # ─── Security Headers ────────────────────────────────────────────────────────
    # Prevent clickjacking
    Header always set X-Frame-Options "SAMEORIGIN"
    # Prevent MIME sniffing
    Header always set X-Content-Type-Options "nosniff"
    # Enable XSS protection in older browsers
    Header always set X-XSS-Protection "1; mode=block"
    # Strict Transport Security (HTTPS only, 1 year)
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    # Referrer policy
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    # Permissions policy — disable unused browser features
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    # Remove PHP version header
    Header always unset X-Powered-By
</VirtualHost>

# ─── Global Configuration ──────────────────────────────────────────────────
# Move global directives outside of VirtualHost
ServerTokens Prod
ServerSignature Off
